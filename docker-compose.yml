

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-leads-backend
    ports:
      - "5001:5000"
    env_file:
      - ./backend/.env
    networks:
      - smart-leads-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-leads-frontend
    ports:
      - "3000:80"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    networks:
      - smart-leads-network
    restart: unless-stopped

networks:
  smart-leads-network:
    driver: bridge