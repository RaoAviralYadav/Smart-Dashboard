

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-leads-backend
    ports:
      - "5001:5000"
    env_file:
      - ./backend/.env
    environment:
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production-12345
      - NODE_ENV=production
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
    networks:
      - smart-leads-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-leads-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:5001/api
    depends_on:
      - backend
    networks:
      - smart-leads-network
    restart: unless-stopped

networks:
  smart-leads-network:
    driver: bridge